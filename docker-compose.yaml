services:
  pgdb:
    image: "postgres:17-alpine"
    container_name: "pgdb"
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: pwd123
      POSTGRES_DB: db_test
    ports:
      - "54320:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d db_test"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: "sprin1-app"
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      DB_HOST: pgdb
      DB_PORT: "5432"
      DB_USER: db_user
      DB_PASSWORD: pwd123
      DB_NAME: db_test
      DB_SSLMODE: disable
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_RATING_TOPIC: "user-rating-recalc"
      KAFKA_RATING_GROUP_ID: "sprin1-rating-consumer"
    depends_on:
      pgdb:
        condition: service_healthy
      kafka:
        condition: service_started

  zookeeper:
    image: "bitnami/zookeeper:3.9"
    container_name: "zk"
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: "bitnami/kafka:3.7"
    container_name: "kafka"
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zk:2181"
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    depends_on:
      - zookeeper

volumes:
  pgdata: